baseURL: https://douyixuan.github.io/
title: 兜忆轩 | Cedric's Compiler Notes
languageCode: en-us
pagination.pagerSize: 5
theme: ["github.com/adityatelange/hugo-PaperMod"]
module:
  imports:
    - path: github.com/adityatelange/hugo-PaperMod
    - path: github.com/hugomods/mermaid
relativeURLs: true
canonifyURLs: true

menu:
  main:
    - name: Search
      url: search/
      weight: 5
    - name: Tags
      url: /tags/
      weight: 10
    - name: Me
      url: posts/about/
      weight: 15

outputs:
  home:
    - HTML
    - RSS
    - JSON # for search

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  description: "Cedric's lab notes on compiler, GPU kernels, MLIR, Triton, and TVM."
  author: Cedric

  defaultTheme: auto
  # disableThemeToggle: true

  ShowShareButtons: true
  # disableSpecial1stPost: true
  ShowReadingTime: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  # ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  # comments: false
  images: ["images/papermod-cover.png"]

  mermaidZoom: true
  mermaid:
    force: true
    js_url: https://cdn.jsdelivr.net/npm/mermaid@latest/dist/mermaid.esm.min.mjs

  profileMode:
    enabled: false
    title: PaperMod
    imageUrl: "#"
    imageTitle: my image
    # imageWidth: 120
    # imageHeight: 120
    buttons:
      - name: Tags
        url: tags

  homeInfoParams:
    Title: "兜忆轩"
    Content: >
      我是 Cedric，做 compiler / GPU / backend systems。

      这里记录我拆 AI 编译器、Triton/TVM/MLIR、CUDA kernel 和工程工具的过程。

      文章分为 lab notes、concept notes 和 essays；lab notes 优先给出可复现代码。

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    includeMatches: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    # limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]
